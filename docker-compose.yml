# Tinker server 一键启动
#
# 开发: docker compose up
# 生产: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 数据 volume 挂载到宿主机 ./data/ · 容器重启不丢

services:
  tinker:
    build: .
    image: tinker:latest
    container_name: tinker-server
    restart: unless-stopped
    ports:
      - "${PORT:-8788}:8788"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 8788
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      RATE_LIMIT_ACTION: ${RATE_LIMIT_ACTION:-60}
      RATE_LIMIT_STATE: ${RATE_LIMIT_STATE:-300}
      DB_FILE: /data/tinker.db
      DATA_FILE: /data/data.json
      BASE_URL: ${BASE_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    volumes:
      - ./data:/data
      # 网页文件挂到外面 · 改完只要 restart 不要 rebuild · 10 秒上线
      - ./webapp:/app/webapp:ro
      # 仓库 .git 只读挂进来 · /api/cli-version 读它算 CLI 落后多少 (宿主 git pull 后容器即时见到)
      - ./.git:/app/.gitdir:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8788/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
