# Nginx 反代配置 (备选方案 · 如果不用 Caddy)
#
# 用法:
#   1. sudo apt install nginx certbot python3-certbot-nginx
#   2. 把此文件复制到 /etc/nginx/sites-available/tinker
#   3. ln -s /etc/nginx/sites-available/tinker /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. sudo certbot --nginx -d tinkers.ink  # 自动配 HTTPS
#
# 替换 tinkers.ink 为你的真实域名

upstream tinker_backend {
    server localhost:8788;
    keepalive 16;
}

server {
    listen 80;
    server_name tinkers.ink;

    # certbot 会自动改成 https://
    client_max_body_size 12M;

    location / {
        proxy_pass http://tinker_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # 健康检查直通 · 不走 rate limit
    location /api/health {
        proxy_pass http://tinker_backend/api/health;
        access_log off;
    }

    # 安全 headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
